<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WonderWhisper dictation workflow</title>
  <desc id="desc">Four steps show how WonderWhisper records speech, sends it to a provider, cleans it up with AI, and inserts the final text.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#102326"/>
      <stop offset="1" stop-color="#0B1216"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="28" fill="#071314"/>
  <text x="60" y="70" fill="#EAF7F4" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="760">How dictation moves through the app</text>
  <text x="60" y="108" fill="#9FB8B8" font-family="Inter, Arial, sans-serif" font-size="20">A small flow from microphone input to text insertion in any editable field.</text>

  <g transform="translate(60 156)">
    <rect width="230" height="132" rx="22" fill="url(#panel)" stroke="#2D5D62"/>
    <circle cx="54" cy="50" r="24" fill="#53D6C5"/>
    <path d="M44 51C44 40 48 33 54 33C60 33 64 40 64 51C64 62 60 68 54 68C48 68 44 62 44 51Z" fill="#071314"/>
    <text x="92" y="48" fill="#EAF7F4" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="720">Record</text>
    <text x="28" y="95" fill="#9FB8B8" font-family="Inter, Arial, sans-serif" font-size="16">Tap the floating bubble</text>
  </g>

  <path d="M318 222H390" stroke="#40595D" stroke-width="3" stroke-linecap="round"/>
  <path d="M390 222L374 211V233L390 222Z" fill="#40595D"/>

  <g transform="translate(418 156)">
    <rect width="230" height="132" rx="22" fill="url(#panel)" stroke="#6C5421"/>
    <circle cx="54" cy="50" r="24" fill="#F2B84B"/>
    <path d="M41 50H67M54 37V63" stroke="#071314" stroke-width="8" stroke-linecap="round"/>
    <text x="92" y="48" fill="#EAF7F4" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="720">Transcribe</text>
    <text x="28" y="95" fill="#9FB8B8" font-family="Inter, Arial, sans-serif" font-size="16">Use the chosen provider</text>
  </g>

  <path d="M676 222H748" stroke="#40595D" stroke-width="3" stroke-linecap="round"/>
  <path d="M748 222L732 211V233L748 222Z" fill="#40595D"/>

  <g transform="translate(776 156)">
    <rect width="230" height="132" rx="22" fill="url(#panel)" stroke="#624463"/>
    <circle cx="54" cy="50" r="24" fill="#D690FF"/>
    <path d="M42 54L51 63L68 38" stroke="#071314" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="92" y="48" fill="#EAF7F4" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="720">Clean up</text>
    <text x="28" y="95" fill="#9FB8B8" font-family="Inter, Arial, sans-serif" font-size="16">Rewrite or format with AI</text>
  </g>

  <path d="M1034 222H1082" stroke="#40595D" stroke-width="3" stroke-linecap="round"/>
  <path d="M1082 222L1066 211V233L1082 222Z" fill="#40595D"/>

  <g transform="translate(920 54)">
    <rect x="196" y="102" width="52" height="132" rx="18" fill="#101F24" stroke="#31565B"/>
    <path d="M211 160H233M211 179H228" stroke="#53D6C5" stroke-width="5" stroke-linecap="round"/>
    <text x="165" y="268" fill="#EAF7F4" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="720">Insert</text>
  </g>
</svg>
