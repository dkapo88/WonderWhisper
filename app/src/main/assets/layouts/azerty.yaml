name: Azerty
category: alphabet
description: French AZERTY layout
includeDefaultNumberRow: false
includeDefaultBottomRow: true
rows:
  - type: letters
    keys:
      - label: a
        secondaryCode: "1"
        secondaryLabel: "1"
        popup: ["횪", "찼", "창", "채", "챈", "찾", "책", "훮"]
      - label: z
        secondaryCode: "2"
        secondaryLabel: "2"
      - label: e
        secondaryCode: "3"
        secondaryLabel: "3"
        popup: ["챔", "챕", "챗", "챘", "휆", "휊", "휌"]
      - label: r
        secondaryCode: "4"
        secondaryLabel: "4"
      - label: t
        secondaryCode: "5"
        secondaryLabel: "5"
      - label: y
        secondaryCode: "6"
        secondaryLabel: "6"
      - label: u
        secondaryCode: "7"
        secondaryLabel: "7"
        popup: ["큰", "첬", "첫", "체", "청"]
      - label: i
        secondaryCode: "8"
        secondaryLabel: "8"
        popup: ["카", "챠", "챙", "챦", "챤"]
      - label: o
        secondaryCode: "9"
        secondaryLabel: "9"
        popup: ["흲", "처", "챵", "철", "척", "흹", "첩"]
      - label: p
        secondaryCode: "0"
        secondaryLabel: "0"

  - type: letters
    keys:
      - label: q
        secondaryCode: "@"
        secondaryLabel: "@"
      - label: s
        secondaryCode: "#"
        secondaryLabel: "#"
        popup: ["#", "횩", "힄", "큄"]
      - label: d
        secondaryCode: "&"
        secondaryLabel: "&"
      - label: f
        secondaryCode: "_"
        secondaryLabel: "_"
      - label: g
        secondaryCode: "-"
        secondaryLabel: "-"
      - label: h
        secondaryCode: "+"
        secondaryLabel: "+"
      - label: j
        secondaryCode: "("
        secondaryLabel: "("
      - label: k
        secondaryCode: ")"
        secondaryLabel: ")"
      - label: l
        secondaryCode: "/"
        secondaryLabel: "/"
      - label: m
        secondaryCode: "?"
        secondaryLabel: "?"

  - type: letters
    keys:
      - template: Shift
        weight: 1.5
      - label: w
        secondaryCode: "*"
        secondaryLabel: "*"
      - label: x
        secondaryCode: "\""
        secondaryLabel: "\""
      - label: c
        secondaryCode: "'"
        secondaryLabel: "'"
        popup: ["'", "챌", "훶", "훾"]
      - label: v
        secondaryCode: ":"
        secondaryLabel: ":"
      - label: b
        secondaryCode: ";"
        secondaryLabel: ";"
      - label: n
        secondaryCode: "!"
        secondaryLabel: "!"
        popup: ["!", "챰", "흦"]
      - label: ","
      - template: Delete
        weight: 1.5
